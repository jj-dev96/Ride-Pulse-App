name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './RidePulseMobile/package-lock.json'

      - name: Install dependencies
        working-directory: ./RidePulseMobile
        run: npm install --legacy-peer-deps

      # In an Expo project, sometimes we need to ensure prebuild is run,
      # but if the android folder is committed, we can build right away.
      - name: Generate Android App
        working-directory: ./RidePulseMobile/android
        # Adding execute permission to gradlew in case it's lost
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: RidePulseMobile/android/app/build/outputs/apk/release/app-release.apk
          retention-days: 7
